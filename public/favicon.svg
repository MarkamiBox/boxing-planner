<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="#121212"/>
  
  <!-- Boxing glove body -->
  <g transform="translate(50, 52) rotate(-15)">
    <!-- Wrist band -->
    <rect x="-14" y="18" width="28" height="10" rx="3" fill="#b91c1c"/>
    <rect x="-14" y="20" width="28" height="2" fill="#ef4444" opacity="0.6"/>
    <rect x="-14" y="24" width="28" height="2" fill="#991b1b" opacity="0.6"/>

    <!-- Main glove body -->
    <ellipse cx="0" cy="4" rx="18" ry="20" fill="#b91c1c"/>
    
    <!-- Glove thumb -->
    <ellipse cx="-16" cy="-2" rx="6" ry="9" fill="#b91c1c" transform="rotate(-20, -16, -2)"/>
    
    <!-- Glove highlight -->
    <ellipse cx="-4" cy="-6" rx="8" ry="10" fill="#ef4444" opacity="0.3"/>
    
    <!-- Knuckle line -->
    <line x1="-10" y1="-13" x2="10" y2="-13" stroke="#991b1b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Small gold sparks -->
  <circle cx="72" cy="28" r="2.5" fill="#f59e0b" opacity="0.9"/>
  <circle cx="78" cy="22" r="1.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="68" cy="22" r="1.5" fill="#f59e0b" opacity="0.6"/>
  <line x1="74" y1="18" x2="76" y2="14" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="79" y1="25" x2="84" y2="23" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>